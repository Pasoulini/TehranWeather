[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

[Metadata]
Name=TehranWeather
Author=Parsa Rasouli
Information=Tehran weather widget using Open-Meteo API.
Version=1.2
License=MIT

[Variables]
FontMain=Segoe UI
FontBold=Segoe UI Semibold
Text=245,247,250,255
Muted=170,180,195,255
Accent=86,182,255,255
Panel=12,18,30,230
Line=255,255,255,28
TextStroke=0,0,0,170
WeatherUrl=https://api.open-meteo.com/v1/forecast?latitude=35.6892&longitude=51.3890&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTehran&forecast_days=1

; -------------------------
; DATA
; -------------------------

[MeasureWeatherData]
Measure=Plugin
Plugin=WebParser.dll
Url=#WeatherUrl#
UpdateRate=14400
Download=1
RegExp=(?siU)"current":\{"time":"([^"]+)","interval":[0-9]+,"temperature_2m":([^,]+),"relative_humidity_2m":([^,]+),"apparent_temperature":([^,]+),"precipitation":([^,]+),"weather_code":([0-9]+),"wind_speed_10m":([^}]+)\}.*"daily":\{"time":\["([^"]+)"\],"temperature_2m_max":\[([^\]]+)\],"temperature_2m_min":\[([^\]]+)\],"weather_code":\[([0-9]+)\]\}
Debug=0
ErrorString=--

[MeasureUpdated]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=1
Substitute="T":" "

[MeasureTemp]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=2

[MeasureHumidity]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=3

[MeasureFeelsLike]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=4

[MeasurePrecipitation]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=5

[MeasureCondition]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=6
RegExpSubstitute=1
Substitute="^$":"Unavailable","^0$":"Clear","^1$":"Mainly clear","^2$":"Partly cloudy","^3$":"Overcast","^45$":"Fog","^48$":"Rime fog","^51$":"Light drizzle","^53$":"Drizzle","^55$":"Heavy drizzle","^61$":"Light rain","^63$":"Rain","^65$":"Heavy rain","^71$":"Light snow","^73$":"Snow","^75$":"Heavy snow","^80$":"Light showers","^81$":"Showers","^82$":"Heavy showers","^95$":"Thunderstorm","^96$":"Thunderstorm with hail","^99$":"Thunderstorm with hail"

[MeasureWeatherIcon]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=6
RegExpSubstitute=1
Substitute="^$":"unknown","^0$":"clear","^1$":"clear","^2$":"partly","^3$":"cloudy","^45$":"fog","^48$":"fog","^51$":"rain","^53$":"rain","^55$":"rain","^61$":"rain","^63$":"rain","^65$":"rain","^71$":"snow","^73$":"snow","^75$":"snow","^80$":"rain","^81$":"rain","^82$":"rain","^95$":"thunder","^96$":"thunder","^99$":"thunder"

[MeasureWind]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=7

[MeasureHigh]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=9

[MeasureLow]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureWeatherData]
StringIndex=10

; -------------------------
; METERS
; -------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,280,164,16 | Fill Color 18,22,36,220 | StrokeWidth 1 | Stroke Color 40,50,70,100

[MeterTitle]
Meter=String
X=18
Y=16
FontFace=#FontBold#
FontSize=15
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Tehran

[MeterTemp]
Meter=String
MeasureName=MeasureTemp
X=18
Y=46
W=120
H=44
FontFace=#FontBold#
FontSize=32
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=%1 C

[MeterWeatherIcon]
Meter=Image
ImageName=#@#Icons\[MeasureWeatherIcon].png
X=140
Y=48
W=36
H=36
PreserveAspectRatio=1
DynamicVariables=1

[MeterCondition]
Meter=String
MeasureName=MeasureCondition
X=262
Y=54
W=100
H=20
StringAlign=Right
FontFace=#FontBold#
FontSize=11
FontColor=#Accent#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
Text=%1

[MeterFeels]
Meter=String
MeasureName=MeasureFeelsLike
X=262
Y=78
W=118
H=16
StringAlign=Right
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Feels like %1 C

[MeterDivider]
Meter=Shape
Shape=Rectangle 18,103,244,1,0 | Fill Color #Line# | StrokeWidth 0

[MeterHighLow]
Meter=String
MeasureName=MeasureHigh
MeasureName2=MeasureLow
X=18
Y=116
W=120
H=16
FontFace=#FontMain#
FontSize=10
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=H %1 C / L %2 C

[MeterHumidity]
Meter=String
MeasureName=MeasureHumidity
X=18
Y=136
W=120
H=16
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Humidity %1%

[MeterWind]
Meter=String
MeasureName=MeasureWind
X=262
Y=116
W=120
H=16
StringAlign=Right
FontFace=#FontMain#
FontSize=10
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Wind %1 km/h

[MeterPrecipitation]
Meter=String
MeasureName=MeasurePrecipitation
X=262
Y=136
W=120
H=16
StringAlign=Right
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Rain %1 mm

[MeterRefreshHitbox]
Meter=Shape
Shape=Rectangle 0,0,280,164,16 | Fill Color 0,0,0,0 | StrokeWidth 0
LeftMouseUpAction=[!Refresh]
ToolTipText=Click to refresh
